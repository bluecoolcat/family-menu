<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B6B">
    <title>🍽️ 今天吃什么</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .dish-card { transition: all 0.2s; }
        .dish-card:active { transform: scale(0.98); }
        .selected { border-color: #FF6B6B !important; background: #FFF5F5 !important; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal { animation: modalIn 0.2s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-gradient-to-r from-red-400 to-pink-400 text-white sticky top-0 z-50 shadow-lg">
        <div class="flex items-center justify-between px-4 py-3">
            <h1 class="text-lg font-bold">🍽️ 今天吃什么</h1>
            <div class="flex gap-2">
                <button onclick="showPage('menu')" class="px-3 py-1 rounded-full text-sm bg-white/20 hover:bg-white/30 transition">📋 菜单</button>
                <button onclick="showPage('dishes')" class="px-3 py-1 rounded-full text-sm bg-white/20 hover:bg-white/30 transition">🍳 点菜</button>
                <button onclick="showPage('manage')" class="px-3 py-1 rounded-full text-sm bg-white/20 hover:bg-white/30 transition">⚙️ 管理</button>
                <button onclick="showPage('shopping')" class="px-3 py-1 rounded-full text-sm bg-white/20 hover:bg-white/30 transition">🛒 清单</button>
            </div>
        </div>
    </nav>

    <!-- 今日菜单页 -->
    <div id="page-menu" class="page p-4">
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-bold text-gray-800">📋 今日菜单</h2>
                <span id="menu-date" class="text-sm text-gray-500"></span>
            </div>
            <div id="today-menu" class="space-y-2">
                <p class="text-gray-400 text-center py-8">还没有点菜，去点菜吧 👇</p>
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="clearMenu()" class="flex-1 py-2 rounded-xl border border-red-300 text-red-500 text-sm hover:bg-red-50 transition">🗑️ 清空</button>
                <button onclick="showPage('dishes')" class="flex-1 py-2 rounded-xl bg-gradient-to-r from-red-400 to-pink-400 text-white text-sm font-medium hover:opacity-90 transition">➕ 继续点菜</button>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-4">
            <h3 class="text-sm font-bold text-gray-600 mb-3">🕐 最近7天</h3>
            <div id="history-list" class="space-y-2 text-sm text-gray-500"><p>暂无记录</p></div>
        </div>
    </div>

    <!-- 点菜页 -->
    <div id="page-dishes" class="page p-4 hidden">
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-bold text-gray-800">🍳 菜品库</h2>
                <div class="flex gap-2">
                    <button onclick="showCustomDishModal()" class="px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-sm hover:bg-blue-200 transition">✏️ 自选菜</button>
                    <button onclick="randomPick()" class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 text-sm hover:bg-yellow-200 transition">🎲 随便</button>
                </div>
            </div>
            <div class="flex gap-2 mb-3 overflow-x-auto pb-2">
                <button onclick="filterCategory('all')" class="category-btn px-3 py-1 rounded-full bg-red-100 text-red-600 text-sm whitespace-nowrap active" data-cat="all">全部</button>
                <button onclick="filterCategory('quick')" class="category-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 text-sm whitespace-nowrap" data-cat="quick">⚡ 快手菜</button>
                <button onclick="filterCategory('weekend')" class="category-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 text-sm whitespace-nowrap" data-cat="weekend">🍲 周末菜</button>
                <button onclick="filterCategory('soup')" class="category-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 text-sm whitespace-nowrap" data-cat="soup">🥣 汤羹</button>
                <button onclick="filterCategory('staple')" class="category-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 text-sm whitespace-nowrap" data-cat="staple">🍚 主食</button>
            </div>
            <div id="dishes-grid" class="grid grid-cols-2 gap-3"></div>
        </div>
        <div id="selected-preview" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-lg hidden">
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-600">已选 <span id="selected-count" class="font-bold text-red-500">0</span> 道</span>
                <button onclick="confirmSelection()" class="px-6 py-2 rounded-full bg-gradient-to-r from-red-400 to-pink-400 text-white font-medium hover:opacity-90 transition">确认点菜 ✅</button>
            </div>
        </div>
    </div>

    <!-- 管理页 -->
    <div id="page-manage" class="page p-4 hidden">
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-bold text-gray-800">⚙️ 菜品管理</h2>
                <button onclick="showAddDishModal()" class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm hover:bg-green-200 transition">➕ 增加菜品</button>
            </div>
            <div id="manage-dishes-list" class="space-y-2"></div>
        </div>
    </div>

    <!-- 购物清单页 -->
    <div id="page-shopping" class="page p-4 hidden">
        <div class="bg-white rounded-2xl shadow-sm p-4">
            <h2 class="text-lg font-bold text-gray-800 mb-3">🛒 购物清单</h2>
            <div id="shopping-list" class="space-y-2"><p class="text-gray-400 text-center py-8">还没有点菜，无法生成清单</p></div>
            <button onclick="copyShoppingList()" class="w-full mt-4 py-3 rounded-xl bg-gradient-to-r from-green-400 to-teal-400 text-white font-medium hover:opacity-90 transition">📋 复制清单</button>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md modal">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-bold text-gray-800">增加菜品</h3>
                <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div class="p-4 space-y-3" id="modal-content"></div>
        </div>
    </div>

    <script>
        // 预置菜品
        const defaultDishes = [
            { id: 1, name: '番茄炒蛋', emoji: '🍅', category: 'quick', time: '10分钟', ingredients: ['番茄2个', '鸡蛋3个', '葱花'] },
            { id: 2, name: '红烧肉', emoji: '🥩', category: 'weekend', time: '60分钟', ingredients: ['五花肉500g', '冰糖', '生抽', '老抽'] },
            { id: 3, name: '青椒肉丝', emoji: '🫑', category: 'quick', time: '15分钟', ingredients: ['青椒3个', '瘦肉200g', '蒜末'] },
            { id: 4, name: '麻婆豆腐', emoji: '🍮', category: 'quick', time: '15分钟', ingredients: ['嫩豆腐1盒', '肉末100g', '豆瓣酱'] },
            { id: 5, name: '红烧鲫鱼', emoji: '🐟', category: 'weekend', time: '25分钟', ingredients: ['鲫鱼1条', '葱姜蒜', '生抽老抽'] },
            { id: 6, name: '糖醋排骨', emoji: '🍖', category: 'weekend', time: '45分钟', ingredients: ['排骨500g', '糖醋汁', '芝麻'] },
            { id: 7, name: '炒花菜', emoji: '🥦', category: 'quick', time: '10分钟', ingredients: ['花菜1颗', '五花肉', '干辣椒'] },
            { id: 8, name: '番茄鸡蛋汤', emoji: '🥣', category: 'soup', time: '10分钟', ingredients: ['番茄1个', '鸡蛋1个', '葱花'] },
            { id: 9, name: '紫菜蛋花汤', emoji: '🍲', category: 'soup', time: '5分钟', ingredients: ['紫菜', '鸡蛋', '虾皮'] },
            { id: 10, name: '蛋炒饭', emoji: '🍚', category: 'staple', time: '10分钟', ingredients: ['米饭2碗', '鸡蛋2个', '葱花'] },
            { id: 11, name: '宫保鸡丁', emoji: '🍗', category: 'quick', time: '20分钟', ingredients: ['鸡胸肉300g', '花生米', '干辣椒'] },
            { id: 12, name: '可乐鸡翅', emoji: '🍖', category: 'weekend', time: '30分钟', ingredients: ['鸡翅10个', '可乐1罐', '生抽'] },
            { id: 13, name: '酸辣土豆丝', emoji: '🥔', category: 'quick', time: '10分钟', ingredients: ['土豆2个', '干辣椒', '醋'] },
            { id: 14, name: '玉米排骨汤', emoji: '🌽', category: 'soup', time: '60分钟', ingredients: ['排骨300g', '玉米1根', '胡萝卜'] },
            { id: 15, name: '豆芽炒牛肉', emoji: '🥩', category: 'quick', time: '15分钟', ingredients: ['牛肉200g', '绿豆芽', '青椒'] },
            { id: 16, name: '雪菜炒笋', emoji: '🎋', category: 'quick', time: '15分钟', ingredients: ['雪菜', '春笋', '肉丝'] },
            { id: 17, name: '地三鲜', emoji: '🍆', category: 'quick', time: '20分钟', ingredients: ['茄子', '土豆', '青椒'] },
            { id: 18, name: '腌笃鲜', emoji: '🍲', category: 'soup', time: '90分钟', ingredients: ['咸肉', '鲜肉', '春笋', '百叶结'] },
            { id: 19, name: '红烧鱼块', emoji: '🐟', category: 'weekend', time: '30分钟', ingredients: ['草鱼块', '葱姜蒜', '豆瓣酱'] },
            { id: 20, name: '水煮虾', emoji: '🦐', category: 'quick', time: '10分钟', ingredients: ['基围虾', '姜片', '料酒'] }
        ];

        const STORAGE_KEYS = {
            dishes: 'dishes',
            todayMenu: 'todayMenu',
            history: 'history'
        };
        const SYNC_ENDPOINT = '/api/menu-state';
        const SYNC_POLL_INTERVAL_MS = 5000;

        let dishes = readJSON(STORAGE_KEYS.dishes, defaultDishes);
        let todayMenu = readJSON(STORAGE_KEYS.todayMenu, []);
        let menuHistory = readJSON(STORAGE_KEYS.history, []);
        let selectedDishes = new Set();
        let currentCategory = 'all';
        let currentPage = 'menu';
        let nextId = Math.max(...dishes.map(d => d.id), 0) + 1;
        let syncInitialized = false;
        let syncInFlight = false;
        let lastSharedStateHash = '';
        let stateUpdatedAt = 0;

        function readJSON(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch {
                return fallback;
            }
        }

        function saveLocalState() {
            localStorage.setItem(STORAGE_KEYS.dishes, JSON.stringify(dishes));
            localStorage.setItem(STORAGE_KEYS.todayMenu, JSON.stringify(todayMenu));
            localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(menuHistory));
        }

        function getComparableState() {
            return {
                dishes,
                todayMenu,
                history: menuHistory
            };
        }

        function getStateTimestamp(state = {}) {
            return typeof state.updatedAt === 'number' ? state.updatedAt : 0;
        }

        function getStateHash(state = getComparableState()) {
            return JSON.stringify({
                dishes: Array.isArray(state.dishes) ? state.dishes : [],
                todayMenu: Array.isArray(state.todayMenu) ? state.todayMenu : [],
                history: Array.isArray(state.history) ? state.history : []
            });
        }

        function applySharedState(state) {
            dishes = Array.isArray(state.dishes) && state.dishes.length > 0 ? state.dishes : defaultDishes;
            todayMenu = Array.isArray(state.todayMenu) ? state.todayMenu : [];
            menuHistory = Array.isArray(state.history) ? state.history : [];
            nextId = Math.max(...dishes.map(d => d.id), 0) + 1;
            stateUpdatedAt = getStateTimestamp(state);
            lastSharedStateHash = getStateHash();
            saveLocalState();
        }

        function getSharedState() {
            return {
                ...getComparableState(),
                updatedAt: stateUpdatedAt
            };
        }

        function hasLocalChangesToShare() {
            return todayMenu.length > 0 || menuHistory.length > 0 || JSON.stringify(dishes) !== JSON.stringify(defaultDishes);
        }

        async function pullSharedState() {
            const response = await fetch(`${SYNC_ENDPOINT}?t=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) throw new Error('sync unavailable');
            const data = await response.json();
            return data.state || null;
        }

        async function pushSharedState() {
            if (syncInFlight) return;
            syncInFlight = true;
            try {
                lastSharedStateHash = getStateHash();
                await fetch(SYNC_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(getSharedState())
                });
            } catch {
                // Keep local state if cloud sync is not configured yet.
            } finally {
                syncInFlight = false;
            }
        }

        async function syncStateFromCloud() {
            try {
                const remoteState = await pullSharedState();
                if (remoteState) {
                    const remoteUpdatedAt = getStateTimestamp(remoteState);
                    if (remoteUpdatedAt < stateUpdatedAt) {
                        return false;
                    }

                    if (remoteUpdatedAt === stateUpdatedAt && getStateHash(remoteState) === lastSharedStateHash) {
                        return false;
                    }

                    applySharedState(remoteState);
                    return true;
                }
                if (!syncInitialized && hasLocalChangesToShare()) {
                    await pushSharedState();
                }
            } catch {
                if (!syncInitialized && hasLocalChangesToShare()) {
                    await pushSharedState();
                }
            } finally {
                syncInitialized = true;
            }
            return false;
        }

        async function persistState() {
            stateUpdatedAt = Date.now();
            saveLocalState();
            lastSharedStateHash = getStateHash();
            await pushSharedState();
        }

        function renderAll() {
            renderDishes();
            renderTodayMenu();
            renderHistory();
            renderShoppingList();
            renderManageList();
            updateSelectedPreview();
        }

        function renderCurrentPage() {
            if (currentPage === 'menu') {
                renderTodayMenu();
                renderHistory();
                return;
            }

            if (currentPage === 'dishes') {
                renderDishes();
                updateSelectedPreview();
                return;
            }

            if (currentPage === 'shopping') {
                renderShoppingList();
                return;
            }

            if (currentPage === 'manage') {
                renderManageList();
            }
        }

        async function syncAndRenderCurrentPage() {
            const changed = await syncStateFromCloud();
            if (changed) renderCurrentPage();
        }

        function startSyncPolling() {
            setInterval(syncAndRenderCurrentPage, SYNC_POLL_INTERVAL_MS);

            document.addEventListener('visibilitychange', async () => {
                if (document.hidden) return;
                await syncAndRenderCurrentPage();
            });

            window.addEventListener('focus', syncAndRenderCurrentPage);
            window.addEventListener('pageshow', syncAndRenderCurrentPage);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('menu-date').textContent = new Date().toLocaleDateString('zh-CN');
            lastSharedStateHash = getStateHash();
            renderAll();
            const changed = await syncStateFromCloud();
            if (changed) renderCurrentPage();
            startSyncPolling();
        });

        function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            if (page === 'menu') renderTodayMenu();
            if (page === 'shopping') renderShoppingList();
            if (page === 'manage') renderManageList();
            syncAndRenderCurrentPage();
        }

        function renderDishes() {
            const grid = document.getElementById('dishes-grid');
            const filtered = currentCategory === 'all' ? dishes : dishes.filter(d => d.category === currentCategory);
            grid.innerHTML = filtered.map(dish => `
                <div class="dish-card border-2 border-gray-100 rounded-xl p-3 cursor-pointer ${selectedDishes.has(dish.id) ? 'selected' : 'bg-white'}" onclick="toggleDish(${dish.id})">
                    <div class="text-3xl mb-2">${dish.emoji}</div>
                    <div class="font-bold text-gray-800 text-sm">${dish.name}</div>
                    <div class="text-xs text-gray-500 mt-1">⏱️ ${dish.time}</div>
                    ${selectedDishes.has(dish.id) ? '<div class="text-red-500 text-xs mt-1">✓ 已选</div>' : ''}
                </div>
            `).join('');
        }

        function toggleDish(id) {
            if (selectedDishes.has(id)) selectedDishes.delete(id);
            else selectedDishes.add(id);
            renderDishes();
            updateSelectedPreview();
        }

        function updateSelectedPreview() {
            const preview = document.getElementById('selected-preview');
            const count = document.getElementById('selected-count');
            if (selectedDishes.size > 0) {
                preview.classList.remove('hidden');
                count.textContent = selectedDishes.size;
            } else {
                preview.classList.add('hidden');
            }
        }

        async function confirmSelection() {
            const selected = dishes.filter(d => selectedDishes.has(d.id));
            todayMenu = [...todayMenu, ...selected];
            menuHistory.unshift({ date: new Date().toISOString().split('T')[0], dishes: selected.map(d => d.name) });
            menuHistory = menuHistory.slice(0, 7);
            await persistState();
            selectedDishes.clear();
            updateSelectedPreview();
            showPage('menu');
        }

        function renderTodayMenu() {
            const container = document.getElementById('today-menu');
            if (todayMenu.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-8">还没有点菜，去点菜吧 👇</p>';
                return;
            }
            container.innerHTML = todayMenu.map((dish, index) => `
                <div class="flex items-center justify-between bg-gray-50 rounded-xl p-3 fade-in">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${dish.emoji}</span>
                        <div>
                            <div class="font-medium text-gray-800">${dish.name}</div>
                            <div class="text-xs text-gray-500">⏱️ ${dish.time}</div>
                        </div>
                    </div>
                    <button onclick="removeDish(${index})" class="text-gray-400 hover:text-red-500 px-2">✕</button>
                </div>
            `).join('');
        }

        async function removeDish(index) {
            todayMenu.splice(index, 1);
            await persistState();
            renderTodayMenu();
            renderShoppingList();
        }

        async function clearMenu() {
            if (todayMenu.length === 0) return;
            if (confirm('确定清空今日菜单吗？')) {
                todayMenu = [];
                await persistState();
                renderTodayMenu();
                renderShoppingList();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (menuHistory.length === 0) {
                container.innerHTML = '<p>暂无记录</p>';
                return;
            }
            container.innerHTML = menuHistory.map(h => `
                <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                    <span class="text-gray-400">${h.date}</span>
                    <span class="text-gray-600 truncate max-w-[200px]">${h.dishes.join('、')}</span>
                </div>
            `).join('');
        }

        function renderShoppingList() {
            const container = document.getElementById('shopping-list');
            if (todayMenu.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-8">还没有点菜，无法生成清单</p>';
                return;
            }
            const allIngredients = todayMenu.flatMap(d => d.ingredients);
            const uniqueIngredients = [...new Set(allIngredients)];
            container.innerHTML = uniqueIngredients.map((item, index) => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                    <input type="checkbox" id="item-${index}" class="w-5 h-5 rounded border-gray-300 text-red-500">
                    <label for="item-${index}" class="flex-1 text-gray-800">${item}</label>
                </div>
            `).join('');
        }

        function copyShoppingList() {
            if (todayMenu.length === 0) return;
            const allIngredients = todayMenu.flatMap(d => d.ingredients);
            const text = `今日菜单：${todayMenu.map(d => d.name).join('、')}\n\n购物清单：\n${allIngredients.join('\n')}`;
            navigator.clipboard.writeText(text).then(() => alert('清单已复制！'));
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                if (btn.dataset.cat === cat) {
                    btn.classList.add('bg-red-100', 'text-red-600');
                    btn.classList.remove('bg-gray-100', 'text-gray-600');
                } else {
                    btn.classList.remove('bg-red-100', 'text-red-600');
                    btn.classList.add('bg-gray-100', 'text-gray-600');
                }
            });
            renderDishes();
        }

        function randomPick() {
            const filtered = currentCategory === 'all' ? dishes : dishes.filter(d => d.category === currentCategory);
            if (filtered.length === 0) {
                alert('当前分类没有可选菜品');
                return;
            }
            const random = filtered[Math.floor(Math.random() * filtered.length)];
            if (!selectedDishes.has(random.id)) {
                selectedDishes.add(random.id);
                renderDishes();
                updateSelectedPreview();
            }
            alert(`🎲 随机推荐：${random.emoji} ${random.name}`);
        }

        // ===== 新增：管理功能 =====
        function renderManageList() {
            const container = document.getElementById('manage-dishes-list');
            container.innerHTML = dishes.map(dish => `
                <div class="flex items-center justify-between bg-gray-50 rounded-xl p-3">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${dish.emoji}</span>
                        <div>
                            <div class="font-medium text-gray-800">${dish.name}</div>
                            <div class="text-xs text-gray-500">${dish.category} · ${dish.time}</div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editDish(${dish.id})" class="px-3 py-1 rounded-full bg-blue-100 text-blue-600 text-sm">编辑</button>
                        <button onclick="deleteDish(${dish.id})" class="px-3 py-1 rounded-full bg-red-100 text-red-600 text-sm">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function showModal(title, content) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function showAddDishModal() {
            showModal('➕ 增加菜品', `
                <input type="hidden" id="edit-id" value="">
                <input type="text" id="input-name" placeholder="菜品名称" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" id="input-emoji" placeholder="Emoji 如: 🍜" class="w-full px-3 py-2 border rounded-xl">
                <select id="input-category" class="w-full px-3 py-2 border rounded-xl">
                    <option value="quick">⚡ 快手菜</option>
                    <option value="weekend">🍲 周末菜</option>
                    <option value="soup">🥣 汤羹</option>
                    <option value="staple">🍚 主食</option>
                </select>
                <input type="text" id="input-time" placeholder="烹饪时间 如: 15分钟" class="w-full px-3 py-2 border rounded-xl">
                <textarea id="input-ingredients" placeholder="食材，用逗号分隔 如: 猪肉,青椒,蒜" class="w-full px-3 py-2 border rounded-xl" rows="3"></textarea>
                <button onclick="saveDish()" class="w-full py-2 rounded-xl bg-gradient-to-r from-green-400 to-teal-400 text-white font-medium">保存</button>
            `);
        }

        function editDish(id) {
            const dish = dishes.find(d => d.id === id);
            showModal('✏️ 编辑菜品', `
                <input type="hidden" id="edit-id" value="${id}">
                <input type="text" id="input-name" value="${dish.name}" placeholder="菜品名称" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" id="input-emoji" value="${dish.emoji}" placeholder="Emoji" class="w-full px-3 py-2 border rounded-xl">
                <select id="input-category" class="w-full px-3 py-2 border rounded-xl">
                    <option value="quick" ${dish.category === 'quick' ? 'selected' : ''}>⚡ 快手菜</option>
                    <option value="weekend" ${dish.category === 'weekend' ? 'selected' : ''}>🍲 周末菜</option>
                    <option value="soup" ${dish.category === 'soup' ? 'selected' : ''}>🥣 汤羹</option>
                    <option value="staple" ${dish.category === 'staple' ? 'selected' : ''}>🍚 主食</option>
                </select>
                <input type="text" id="input-time" value="${dish.time}" placeholder="烹饪时间" class="w-full px-3 py-2 border rounded-xl">
                <textarea id="input-ingredients" placeholder="食材" class="w-full px-3 py-2 border rounded-xl" rows="3">${dish.ingredients.join(',')}</textarea>
                <button onclick="saveDish()" class="w-full py-2 rounded-xl bg-gradient-to-r from-blue-400 to-indigo-400 text-white font-medium">保存修改</button>
            `);
        }

        async function saveDish() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('input-name').value.trim();
            const emoji = document.getElementById('input-emoji').value.trim() || '🍽️';
            const category = document.getElementById('input-category').value;
            const time = document.getElementById('input-time').value.trim() || '15分钟';
            const ingredients = document.getElementById('input-ingredients').value.split(/[,，]/).map(s => s.trim()).filter(s => s);

            if (!name) { alert('请输入菜品名称'); return; }

            if (id) {
                const index = dishes.findIndex(d => d.id === parseInt(id));
                dishes[index] = { ...dishes[index], name, emoji, category, time, ingredients };
            } else {
                dishes.push({ id: nextId++, name, emoji, category, time, ingredients });
            }

            await persistState();
            closeModal();
            renderDishes();
            renderManageList();
        }

        async function deleteDish(id) {
            if (!confirm('确定删除这道菜吗？')) return;
            dishes = dishes.filter(d => d.id !== id);
            selectedDishes.delete(id);
            await persistState();
            renderDishes();
            renderManageList();
        }

        // ===== 新增：自选菜功能 =====
        function showCustomDishModal() {
            showModal('✏️ 自选菜（临时）', `
                <input type="text" id="custom-name" placeholder="菜名 如: 老婆爱吃的红烧肉" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" id="custom-emoji" placeholder="Emoji 如: ❤️" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" id="custom-time" placeholder="时间 如: 30分钟" class="w-full px-3 py-2 border rounded-xl">
                <textarea id="custom-ingredients" placeholder="食材（可选）" class="w-full px-3 py-2 border rounded-xl" rows="2"></textarea>
                <p class="text-xs text-gray-500">💡 自选菜只加入今日菜单，不会保存到菜品库</p>
                <button onclick="addCustomDish()" class="w-full py-2 rounded-xl bg-gradient-to-r from-blue-400 to-indigo-400 text-white font-medium">加入今日菜单</button>
            `);
        }

        async function addCustomDish() {
            const name = document.getElementById('custom-name').value.trim();
            const emoji = document.getElementById('custom-emoji').value.trim() || '🍽️';
            const time = document.getElementById('custom-time').value.trim() || '15分钟';
            const ingredients = document.getElementById('custom-ingredients').value.split(/[,，]/).map(s => s.trim()).filter(s => s);

            if (!name) { alert('请输入菜名'); return; }

            // 直接加入今日菜单，不保存到菜品库
            todayMenu.push({
                id: 'custom-' + Date.now(),
                name,
                emoji,
                category: 'custom',
                time,
                ingredients: ingredients.length > 0 ? ingredients : ['食材待定']
            });

            await persistState();
            closeModal();
            showPage('menu');
        }

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
